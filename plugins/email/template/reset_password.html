{{define "content"}}
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
        <td style="padding-bottom: 24px;">
            <h2 style="margin: 0 0 16px; font-size: 20px; font-weight: 600; color: #1a1a1a;">
                重置密码
            </h2>
            <p style="margin: 0 0 24px; font-size: 15px; color: #555555; line-height: 1.6;">
                我们收到了您的密码重置请求。请点击下方按钮设置新密码：
            </p>
        </td>
    </tr>
    <tr>
        <td align="center" style="padding-bottom: 24px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td align="center" style="border-radius: 6px; background-color: #4f7cff;">
                        <a href="{{.ResetURL}}" target="_blank" style="display: inline-block; padding: 12px 32px; font-size: 15px; font-weight: 600; color: #ffffff; text-decoration: none; border-radius: 6px;">
                            重置密码
                        </a>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td style="padding-bottom: 24px;">
            <p style="margin: 0 0 8px; font-size: 13px; color: #888888; line-height: 1.6;">
                如果按钮无法点击，请复制以下链接到浏览器中打开：
            </p>
            <p style="margin: 0; font-size: 13px; color: #4f7cff; word-break: break-all; line-height: 1.6;">
                {{.ResetURL}}
            </p>
        </td>
    </tr>
    <tr>
        <td>
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #fff8f0; border-left: 3px solid #f5a623; border-radius: 4px;">
                <tr>
                    <td style="padding: 12px 16px;">
                        <p style="margin: 0; font-size: 13px; color: #8a6d3b; line-height: 1.6;">
                            <strong>安全提示：</strong>此重置链接将在 <strong style="color: #e74c3c;">{{.Expire}}</strong> 后失效。如非本人操作，请忽略此邮件，您的账户密码不会发生变更。
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
{{end}}
