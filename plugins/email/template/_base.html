{{define "base"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{.Subject}}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f5f7; font-family: Arial, Helvetica, sans-serif; -webkit-font-smoothing: antialiased;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f4f5f7;">
        <tr>
            <td align="center" style="padding: 32px 16px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden;">
                    <tr>
                        <td align="center" style="padding: 24px 32px; background-color: #ffffff; border-bottom: 1px solid #e8e8e8;">
                            <h1 style="margin: 0; font-size: 22px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.5px;">
                                Bamboo Service
                            </h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 32px; color: #333333; font-size: 15px; line-height: 1.6;">
                            {{template "content" .}}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 20px 32px; border-top: 1px solid #e8e8e8; background-color: #fafafa;">
                            <p style="margin: 0; font-size: 12px; color: #999999; text-align: center; line-height: 1.5;">
                                此邮件由 Bamboo Service 自动发送，请勿直接回复。
                            </p>
                            <p style="margin: 8px 0 0; font-size: 12px; color: #999999; text-align: center; line-height: 1.5;">
                                &copy; Bamboo Service. All rights reserved.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
{{end}}
