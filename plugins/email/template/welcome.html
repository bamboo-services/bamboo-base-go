{{define "content"}}
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>

            <h2 style="margin: 0 0 16px; font-size: 20px; font-weight: 600; color: #1a1a1a;">
                欢迎加入！
            </h2>
            <p style="margin: 0; font-size: 15px; color: #555555; line-height: 1.6;">
                亲爱的 <strong style="color: #1a1a1a;">{{.Username}}</strong>，您好！
            </p>
        </td>
    </tr>
    <tr>

    </tr>
    <tr>
        <td style="padding: 16px 0;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td style="border-top: 1px solid #e8e8e8; font-size: 1px; line-height: 1px;">&nbsp;</td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td>
            <p style="margin: 0; font-size: 14px; color: #888888; line-height: 1.6;">
